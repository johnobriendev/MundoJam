services:
  db:
    image: postgis/postgis:16-3.4
    container_name: mundojam_db
    environment:
      POSTGRES_USER: mundojam
      POSTGRES_PASSWORD: mundojam
      POSTGRES_DB: mundojam
    ports:
      - "5432:5432"
    volumes:
      - mundojam_pgdata:/var/lib/postgresql/data

volumes:
  mundojam_pgdata:
